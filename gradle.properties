# Limit Gradle JVM heap — important on constrained machines
org.gradle.jvmargs=-Xmx1536m -XX:+HeapDumpOnOutOfMemoryError

# Limit Kotlin daemon heap — prevents OOM kills during compilation
kotlin.daemon.jvmargs=-Xmx768m

# Disable build cache to reduce memory footprint
org.gradle.caching=false

android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
android.nonTransitiveRClass=true
