name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          mkdir -p app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-mdpi \
                  app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi \
                  app/src/main/res/mipmap-xxxhdpi

      - name: Download YOLOv8n model (main flavor only)
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/yolov8n.tflite \
            "https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.tflite"

      - name: Build GuardEye main debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleMainDebug --no-daemon

      - name: Build GuardEye Light debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleLightDebug --no-daemon

      - name: Upload GuardEye main APK
        uses: actions/upload-artifact@v4
        with:
          name: GuardEye-main-debug
          path: app/build/outputs/apk/main/debug/app-main-debug.apk
          retention-days: 30

      - name: Upload GuardEye Light APK
        uses: actions/upload-artifact@v4
        with:
          name: GuardEye-light-debug
          path: app/build/outputs/apk/light/debug/app-light-debug.apk
          retention-days: 30

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/main/debug/app-main-debug.apk
            app/build/outputs/apk/light/debug/app-light-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
