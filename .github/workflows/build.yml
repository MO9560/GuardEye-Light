name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create signing.properties & restore keystore
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> app/signing.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> app/signing.properties
          echo "keyAlias=guard-eye-new" >> app/signing.properties
          echo "storeFile=guard-eye.jks" >> app/signing.properties
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > app/guard-eye.jks

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          mkdir -p app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-mdpi \
                  app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi \
                  app/src/main/res/mipmap-xxxhdpi

      - name: Download YOLOv8n model (full flavor only)
        run: |
          mkdir -p app/src/main/assets
          curl -L -o app/src/main/assets/yolov8n.tflite \
            "https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.tflite"

      - name: Build GuardEye full debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleFullDebug --no-daemon --stacktrace

      - name: Build GuardEye Light debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleLightDebug --no-daemon --stacktrace

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/full/debug/app-full-debug.apk
            app/build/outputs/apk/light/debug/app-light-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
