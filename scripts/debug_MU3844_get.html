function PutNum (theNum)
{	
	if (theNum == -1)
	{
		document.Form1.Calculator.value = document.Form1.Calculator.value.substring(0, document.Form1.Calculator.value.length - 1)
	}
	else if (document.Form1.Calculator.value.length < 8)
	{
		document.Form1.Calculator.value += theNum		
	}		
	
	document.Form1.Calculator.focus()
}	

function InitInput()
{
	
	document.Form1.Calculator.value = "";
	document.getElementById('resW').value = window.screen.width;
    document.getElementById('resH').value = window.screen.height;	
}

function keyRestrict(e, validchars) {
 var key='', keychar='';
 key = getKeyCode(e);
 if (key == null) return true;
 keychar = String.fromCharCode(key);
 keychar = keychar.toLowerCase();
 validchars = validchars.toLowerCase();
 if (validchars.indexOf(keychar) != -1)
  return true;
 if ( key==null || key==0 || key==8 || key==9 || key==13 || key==27 || key==32)
  return true;
 return false;
}

 function getKeyCode(e)
{
 if (window.event)
    return window.event.keyCode;
 else if (e)
    return e.which;
 else
    return null;
}
function SetEnd (TB)
{
if (TB.createTextRange)
{
var FieldRange = TB.createTextRange();
FieldRange.moveStart('character', TB.value.length);
FieldRange.collapse();
FieldRange.select();
}
}
